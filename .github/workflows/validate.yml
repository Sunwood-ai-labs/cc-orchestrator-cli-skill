name: Validate Skill Repo

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate root skill files
        shell: pwsh
        run: .\scripts\validate-skill.ps1
